<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hot Wings Restaurant</title>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
}

h1{
color:orange;
}

.section{
margin:30px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.item{
background:#222;
padding:15px;
border-radius:10px;
width:200px;
text-align:center;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

button{
background:orange;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff9800;
}

input,select{
display:block;
margin:10px auto;
padding:10px;
width:250px;
border-radius:5px;
border:none;
}

.cart{
background:#000;
padding:20px;
margin:20px;
}

</style>

</head>

<body>

<header>

<h1>🔥 Hot Wings Restaurant</h1>
<p>Online Food Ordering & Table Booking</p>

</header>

<div id="menuContainer"></div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart"></ul>

<h3>Total ₹<span id="total">0</span></h3>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Delivery Address">

<button onclick="order()">Place Order</button>

</div>

<div class="cart">

<h2>Book a Table</h2>

<input id="bname" placeholder="Name">
<input id="bphone" placeholder="Phone">

<input id="bdate" type="date">
<input id="btime" type="time">

<select id="bpersons">
<option>2 Persons</option>
<option>4 Persons</option>
<option>6 Persons</option>
<option>10 Persons</option>
</select>

<button onclick="bookTable()">Book Table</button>

</div>

<script>

let price=120

let menu={

"Momos":[
"Deep Fried Momo","Pan Fried Momo","Honey Toast Momo","Butter Toast Momo",
"Hot Garlic Momo","Chilli Soya Toast Momo","Mayonnaise Momo","Schezwan Momo",
"Tandoori Momo","Dahi Momo","Afghani Momo","Kurkure Momo",
"Momo Thali (15pcs)","Hariyali Momo","Pizza Momo","Wonton Momo"
],

"Pizza":[
"Margherita Pizza","Paneer Cheese Pizza","Paneer Tikka Pizza",
"Chicken Cheese Pizza","Meat Lovers Pizza","Chicken Tikka Pizza",
"Achari Chicken Pizza","Mixed Pizza (Large)",
"Hot Wings Special Pizza (Super Large)",
"Corn Cheese Pizza","Special Combo Pizza"
],

"Burgers":[
"Veg Burger","Chicken Burger","Chicken Cheese Burger","Veg Cheese Burger"
],

"Beverages":[
"Coffee","Lime Juice","Masala Cold Drink","Cold Coffee","Lassi","Coffee Xpresso"
],

"Rolls":[
"Veg Roll","Egg Roll","Double Egg Roll","Jumbo Egg Roll",
"Chicken Roll","Egg Chicken Roll","Paneer Roll","Special Roll"
],

"Veg Starters":[
"Paneer Pakoda","Chilli Paneer Dry Fry","Veg Manchurian",
"Paneer Manchurian","French Fry","Honey Chilli Potato","Crispy Chilli Corn"
],

"Rice":[
"Plain Rice","Ghee Rice","Veg Fried Rice","Jeera Rice",
"Egg Fried Rice","Paneer Fried Rice","Chicken Fried Rice",
"Andhra Chicken Rice","Mixed Fried Rice"
],

"Noodles":[
"Veg Noodles","Egg Noodles","Paneer Noodles",
"Chicken Noodles","Chicken Schezwan Noodles","Mixed Noodles"
],

"Biryani":[
"Chicken Dum Biryani","Paneer Dum Biryani","Egg Biryani","Mutton Dum Biryani"
],

"Tandoori":[
"Chicken Tandoori","Chicken Leg","Chicken Breast","Chicken Tikka",
"Malai Tikka","Hot Wings","Afghani Chicken","Paneer Tikka",
"Prawn Tikka","Fish Tikka"
]

}

let cart={}

function buildMenu(){

let container=document.getElementById("menuContainer")

for(let category in menu){

let section=document.createElement("div")
section.className="section"

let title=document.createElement("h2")
title.innerText=category

section.appendChild(title)

let box=document.createElement("div")
box.className="menu"

menu[category].forEach(food=>{

let item=document.createElement("div")
item.className="item"

item.innerHTML=`

<h4>${food}</h4>
<p>₹${price}</p>

<div class="qty">
<button onclick="changeQty('${food}',-1)">-</button>
<span id="${food}">0</span>
<button onclick="changeQty('${food}',1)">+</button>
</div>

`

box.appendChild(item)

})

section.appendChild(box)
container.appendChild(section)

}

}

function changeQty(food,val){

if(!cart[food]) cart[food]=0

cart[food]+=val

if(cart[food]<0) cart[food]=0

document.getElementById(food).innerText=cart[food]

updateCart()

}

function updateCart(){

let list=document.getElementById("cart")
list.innerHTML=""

let total=0

for(let item in cart){

if(cart[item]>0){

let li=document.createElement("li")
li.innerText=item+" x "+cart[item]

list.appendChild(li)

total+=cart[item]*price

}

}

document.getElementById("total").innerText=total

}

function order(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

let msg="Food Order:%0A"

for(let item in cart){

if(cart[item]>0){
msg+=item+" x "+cart[item]+"%0A"
}

}

msg+="Name:"+name+"%0A"
msg+="Phone:"+phone+"%0A"
msg+="Address:"+address

window.open("https://wa.me/919957603281?text="+msg)

}

function bookTable(){

let name=document.getElementById("bname").value
let phone=document.getElementById("bphone").value
let date=document.getElementById("bdate").value
let time=document.getElementById("btime").value
let persons=document.getElementById("bpersons").value

let msg="Table Booking:%0A"
msg+="Name:"+name+"%0A"
msg+="Phone:"+phone+"%0A"
msg+="Date:"+date+"%0A"
msg+="Time:"+time+"%0A"
msg+="Persons:"+persons

window.open("https://wa.me/919957603281?text="+msg)

}

buildMenu()

</script>

</body>
</html>
